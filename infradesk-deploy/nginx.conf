user www-data;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 80;
        server_name localhost;

        # ----------------------------------------------------
        # Laravel Backend API Proxy (/api)
        # ----------------------------------------------------
        location = /api {
            return 301 /api/;
        }

        location = /api/ {
            rewrite ^ /index.php last;
        }

        location ^~ /api {
            alias /var/www/backend/public;
            index index.php;
            try_files $uri $uri/ @api;
        }

        location @api {
            rewrite ^/api/?(.*)$ /index.php last;
        }

        location = /index.php {
            root /var/www/backend/public;
            include fastcgi_params;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
            fastcgi_param REQUEST_URI $request_uri;
            fastcgi_param QUERY_STRING $query_string;
        }

        # ----------------------------------------------------
        # Next.js Static Frontend Proxy (Root /)
        # ----------------------------------------------------
        location / {
            root /var/www/frontend;
            index index.html;
            try_files $uri $uri.html $uri/ /index.html;
        }

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|ttf|woff|woff2)$ {
            root /var/www/frontend;
            expires max;
            log_not_found off;
            access_log off;
        }

        error_page 404 /404.html;
        location = /404.html {
            root /var/www/frontend;
            internal;
        }
    }
}
